services:
  - type: web
    name: voice-hero
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MODEL
        value: gemini-3.1-flash-live-preview
      - key: PYTHON_VERSION
        value: "3.11"
